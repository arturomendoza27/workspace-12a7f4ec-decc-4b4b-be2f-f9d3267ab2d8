# ============================================
# Docker Compose para FotoGestor con PostgreSQL
# Configuración para despliegue en Dokploy
# ============================================

services:
  fotogestor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fotogestor
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Base de datos PostgreSQL
      - DATABASE_URL=postgresql://fotogestor:fotogestor123@postgres:5432/fotogestor
      # NextAuth Secret - CAMBIAR EN PRODUCCIÓN
      - NEXTAUTH_SECRET=tu-clave-secreta-muy-segura-cambiar-en-produccion
      # URL de la aplicación - CAMBIAR POR TU DOMINIO
      - NEXTAUTH_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: fotogestor-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=fotogestor
      - POSTGRES_USER=fotogestor
      - POSTGRES_PASSWORD=fotogestor123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fotogestor -d fotogestor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
    driver: local
